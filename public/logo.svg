<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <defs>
    <linearGradient id="glass1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stopColor="#DDE9FF" stopOpacity="0.9"/>
      <stop offset="100%" stopColor="#9FB0C8" stopOpacity="0.4"/>
    </linearGradient>
    <linearGradient id="glass2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stopColor="#ffffff" stopOpacity="0.8"/>
      <stop offset="100%" stopColor="#DDE9FF" stopOpacity="0.1"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#glow)">
    <!-- Abstract 3D Glass Swirl Approximation -->
    <path d="M100,20 C130,20 160,40 175,70 C150,50 120,40 90,50 C110,70 120,100 110,130 C130,100 160,90 180,100 C170,140 140,170 100,180 C70,180 40,160 25,130 C50,150 80,160 110,150 C90,130 80,100 90,70 C70,100 40,110 20,100 C30,60 60,30 100,20 Z" fill="url(#glass1)" stroke="url(#glass2)" stroke-width="2"/>
    <path d="M100,45 C115,45 130,55 140,70 C125,60 110,55 95,60 C105,75 110,90 105,110 C115,90 130,85 145,90 C135,115 120,130 100,135 C85,135 70,125 60,110 C75,120 90,125 105,120 C95,105 90,90 95,70 C85,90 70,95 55,90 C65,65 80,45 100,45 Z" fill="url(#glass2)"/>
  </g>
</svg>
